name: gosec-cp-policy
apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
on:
  workflow_dispatch:
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: write
jobs:
  scan-and-evaluate:
    outputs:
      policy-subject: ${{ steps.gosec-step.outputs.policy-subject }}
    steps:
        - name: checkout-source-code
          id: getscm
          uses: cloudbees-io/checkout@v1
        
        - id: gosec-step
          uses: cloudbees-io/gosec-plugin@v1

  policy-evaluation:
    uses: cloudbees-io/policy-utils/evaluate-policy-context/workflow.yml@v1.2
    needs:
    - scan-and-evaluate
    with:
      input-data: ${{ needs.scan-and-evaluate.outputs.policy-subject }}
      checkpoint-type: workflow
      checkpoint-position: within
